services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        NEXT_PUBLIC_SERVER_BASE_URL: ${NEXT_PUBLIC_SERVER_BASE_URL:-http://127.0.0.1:3001}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://127.0.0.1:54321}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-<SECRET>}
    depends_on:
      server:
        condition: service_healthy
    network_mode: ${LOOMIC_DOCKER_NETWORK_MODE:-host}
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple/}
    env_file:
      - ${LOOMIC_ENV_FILE:-.env.local}
    environment:
      HOST: 0.0.0.0
      LOOMIC_SERVER_PORT: ${LOOMIC_SERVER_PORT:-3001}
      LOOMIC_WEB_ORIGIN: ${LOOMIC_WEB_ORIGIN:-http://127.0.0.1:3000}
      LOOMIC_SKILLS_ROOT: /opt/loomic/skills
      SERVICE_MODE: api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((response)=>response.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    network_mode: ${LOOMIC_DOCKER_NETWORK_MODE:-host}
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com/}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple/}
    depends_on:
      server:
        condition: service_healthy
    env_file:
      - ${LOOMIC_ENV_FILE:-.env.local}
    environment:
      HOST: 0.0.0.0
      LOOMIC_SERVER_PORT: ${LOOMIC_SERVER_PORT:-3001}
      LOOMIC_WEB_ORIGIN: ${LOOMIC_WEB_ORIGIN:-http://127.0.0.1:3000}
      LOOMIC_SKILLS_ROOT: /opt/loomic/skills
      SERVICE_MODE: worker
      WORKER_ID: docker-worker-1
    network_mode: ${LOOMIC_DOCKER_NETWORK_MODE:-host}
    restart: unless-stopped
