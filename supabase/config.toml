[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.project-assets]
public = true
file_size_limit = "50MiB"

[storage.buckets.user-avatars]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "image/gif"]
